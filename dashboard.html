<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>A股产业链行情</title>
<style>
  :root {
    --up: #e74c3c;
    --down: #27ae60;
    --flat: #95a5a6;
    --bg: #0f1923;
    --card-bg: #1a2a3a;
    --card-border: #2a3a4a;
    --text: #ecf0f1;
    --text-muted: #7f8c8d;
    --accent: #3498db;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Helvetica Neue', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }
  .header {
    padding: 20px 32px;
    border-bottom: 1px solid var(--card-border);
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 12px;
  }
  .header h1 { font-size: 22px; font-weight: 600; }
  .header h1 span { color: var(--accent); }
  .header-right { display: flex; align-items: center; gap: 16px; }
  .update-time { font-size: 13px; color: var(--text-muted); }
  .auto-refresh {
    display: flex; align-items: center; gap: 6px;
    font-size: 12px; color: var(--text-muted);
  }
  .auto-refresh label { cursor: pointer; }
  .auto-refresh input { accent-color: var(--accent); }
  .refresh-countdown { font-variant-numeric: tabular-nums; color: var(--accent); }

  /* Ranking bar at top */
  .rank-bar {
    display: flex;
    gap: 12px;
    padding: 16px 32px;
    border-bottom: 1px solid var(--card-border);
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
  }
  .rank-chip {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    padding: 10px 16px;
    border-radius: 10px;
    background: var(--card-bg);
    border: 1px solid var(--card-border);
    min-width: 100px;
    cursor: pointer;
    transition: all 0.2s;
    flex-shrink: 0;
  }
  .rank-chip:hover { border-color: var(--accent); transform: translateY(-1px); }
  .rank-chip .rank-pos {
    font-size: 11px; color: var(--text-muted);
    font-weight: 600; letter-spacing: 1px;
  }
  .rank-chip .rank-name { font-size: 13px; font-weight: 500; white-space: nowrap; }
  .rank-chip .rank-val { font-size: 20px; font-weight: 700; font-variant-numeric: tabular-nums; }
  .rank-chip .rank-sub { font-size: 11px; color: var(--text-muted); }

  /* Chain tab bar (链切换) */
  .chain-bar {
    display: flex;
    gap: 8px;
    padding: 12px 32px 0;
  }
  .chain-btn {
    padding: 10px 22px;
    font-size: 15px;
    font-weight: 600;
    color: var(--text-muted);
    background: var(--card-bg);
    border: 1px solid var(--card-border);
    border-bottom: none;
    border-radius: 10px 10px 0 0;
    cursor: pointer;
    transition: all 0.2s;
  }
  .chain-btn:hover { color: var(--text); }
  .chain-btn.active {
    color: #fff;
    background: var(--accent);
    border-color: var(--accent);
  }

  /* Tab bar for period selection */
  .tab-bar {
    display: flex;
    gap: 0;
    padding: 0 32px;
    border-bottom: 1px solid var(--card-border);
  }
  .tab-btn {
    padding: 12px 20px;
    font-size: 13px;
    font-weight: 500;
    color: var(--text-muted);
    background: none;
    border: none;
    border-bottom: 2px solid transparent;
    cursor: pointer;
    transition: all 0.2s;
  }
  .tab-btn:hover { color: var(--text); }
  .tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); }

  /* Layer section */
  .layer-section {
    padding: 0 32px;
  }
  .layer-title {
    font-size: 14px;
    font-weight: 600;
    color: var(--accent);
    text-transform: uppercase;
    letter-spacing: 2px;
    padding: 20px 0 12px;
    border-bottom: 1px solid var(--card-border);
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .layer-title .layer-icon {
    width: 28px;
    height: 28px;
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    font-weight: 700;
    color: #fff;
  }
  .layer-title.materials .layer-icon { background: #e74c3c; }
  .layer-title.components .layer-icon { background: #3498db; }
  .layer-title.equipment .layer-icon { background: #9b59b6; }

  /* Grid */
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(420px, 1fr));
    gap: 16px;
    padding: 16px 0 8px;
  }
  .group-card {
    background: var(--card-bg);
    border: 1px solid var(--card-border);
    border-radius: 12px;
    overflow: hidden;
    transition: transform 0.2s, box-shadow 0.2s;
  }
  .group-card:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 24px rgba(0,0,0,0.3);
  }
  .card-header {
    padding: 16px 20px;
    cursor: pointer;
    user-select: none;
  }
  .card-top {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 10px;
  }
  .card-name {
    font-size: 16px;
    font-weight: 600;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .card-name .dot {
    width: 10px; height: 10px;
    border-radius: 50%; display: inline-block;
  }
  .expand-icon {
    font-size: 12px; color: var(--text-muted);
    transition: transform 0.2s;
  }
  .expand-icon.open { transform: rotate(180deg); }

  .card-metrics {
    display: flex;
    gap: 16px;
    flex-wrap: wrap;
  }
  .metric {
    display: flex;
    flex-direction: column;
    gap: 2px;
    min-width: 60px;
  }
  .metric-label {
    font-size: 10px;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .metric-value {
    font-size: 20px;
    font-weight: 700;
    font-variant-numeric: tabular-nums;
  }
  .metric-value.up { color: var(--up); }
  .metric-value.down { color: var(--down); }
  .metric-value.flat { color: var(--flat); }
  .metric-value .unit { font-size: 12px; font-weight: 400; }
  .card-desc {
    font-size: 12px;
    color: var(--text-muted);
    margin-top: 8px;
  }

  /* Collapsible stock list */
  .card-body {
    max-height: 0;
    overflow: hidden;
    transition: max-height 0.3s ease;
    border-top: 1px solid var(--card-border);
  }
  .card-body.open { max-height: 800px; }
  .card-body-inner { padding: 12px 20px 16px; }
  .stock-table { width: 100%; border-collapse: collapse; font-size: 13px; }
  .stock-table th {
    text-align: left; padding: 6px 0;
    color: var(--text-muted); font-weight: 500;
    font-size: 11px; text-transform: uppercase;
    letter-spacing: 0.5px;
    border-bottom: 1px solid var(--card-border);
  }
  .stock-table th:last-child,
  .stock-table td:last-child { text-align: right; }
  .stock-table td {
    padding: 7px 0;
    border-bottom: 1px solid rgba(255,255,255,0.04);
    font-variant-numeric: tabular-nums;
  }
  .stock-table tr:last-child td { border-bottom: none; }
  .stock-table .code { color: var(--text-muted); font-size: 12px; }
  .stock-table .tier {
    font-size: 10px; padding: 1px 5px;
    border-radius: 4px; background: rgba(52,152,219,0.15);
    color: var(--accent); margin-left: 6px;
  }

  .footer {
    padding: 16px 32px;
    text-align: center;
    color: var(--text-muted);
    font-size: 12px;
    border-top: 1px solid var(--card-border);
  }

  @media (max-width: 768px) {
    .grid { grid-template-columns: 1fr; padding: 12px 0; }
    .layer-section { padding: 0 12px; }
    .header, .rank-bar, .tab-bar, .footer { padding-left: 12px; padding-right: 12px; }
    .card-metrics { gap: 10px; }
  }
</style>
</head>
<body>

<div class="header">
  <h1><span>A股</span>产业链行情</h1>
  <div class="header-right">
    <div class="auto-refresh">
      <input type="checkbox" id="autoRefreshToggle" checked>
      <label for="autoRefreshToggle">自动刷新</label>
      <span class="refresh-countdown" id="countdown"></span>
    </div>
    <div class="update-time" id="updateTime"></div>
  </div>
</div>

<div class="chain-bar" id="chainBar"></div>

<div class="tab-bar" id="tabBar">
  <button class="tab-btn active" data-period="today">今日</button>
  <button class="tab-btn" data-period="5d">5日累计</button>
  <button class="tab-btn" data-period="20d">20日累计</button>
</div>

<div class="rank-bar" id="rankBar"></div>
<div class="grid" id="grid"></div>
<div class="footer">
  数据来源：腾讯行情 | 流通市值加权 | 编辑 config.json 增删组/个股 | 刷新间隔 5 分钟
</div>

<script>
let DATA = null;
let currentChain = (location.hash || '#').slice(1) || null;  // URL hash 记住所在链
let currentPeriod = 'today';
let refreshTimer = null;
let countdownTimer = null;
let countdownSec = 900;
const REFRESH_INTERVAL = 300; // seconds (5 min)

const PERIOD_KEY = {
  'today': 'today_return',
  '5d': 'cum_5d',
  '20d': 'cum_20d',
};

const LAYER_COLORS = ['#e74c3c', '#3498db', '#9b59b6', '#16a085'];

function cc(val) {
  if (val > 0) return 'up';
  if (val < 0) return 'down';
  return 'flat';
}

function fmtPct(val) {
  const sign = val > 0 ? '+' : '';
  return sign + val.toFixed(2) + '%';
}

function getChain() {
  if (!DATA || !DATA.chains || DATA.chains.length === 0) return null;
  return DATA.chains.find(c => c.id === currentChain) || DATA.chains[0];
}

function sortByPeriod(groups, period) {
  const key = PERIOD_KEY[period];
  return [...groups].sort((a, b) => (b[key] || 0) - (a[key] || 0));
}

function renderChainBar() {
  const chain = getChain();
  const bar = document.getElementById('chainBar');
  bar.innerHTML = DATA.chains.map(c =>
    `<button class="chain-btn ${chain && c.id === chain.id ? 'active' : ''}" onclick="switchChain('${c.id}')">${c.name}</button>`
  ).join('');
}

function switchChain(id) {
  currentChain = id;
  location.hash = id;
  render();
  window.scrollTo({ top: 0 });
}

function renderRankBar(groups) {
  const sorted = sortByPeriod(groups, currentPeriod);
  const key = PERIOD_KEY[currentPeriod];
  const bar = document.getElementById('rankBar');
  bar.innerHTML = sorted.map((g, i) => {
    const val = g[key] || 0;
    return `<div class="rank-chip" onclick="scrollToCard('${g.name}')">
      <div class="rank-pos">#${i + 1}</div>
      <div class="rank-name">${g.name}</div>
      <div class="rank-val ${cc(val)}">${fmtPct(val)}</div>
      <div class="rank-sub">${g.valid_count}只</div>
    </div>`;
  }).join('');
}

function renderCards(chain) {
  const sorted = sortByPeriod(chain.groups, currentPeriod);
  const key = PERIOD_KEY[currentPeriod];
  const grid = document.getElementById('grid');

  // 每条链各自的层定义（key + label），来自 data.json
  const layers = chain.layers || [
    { key: 'materials', label: '材料层' },
    { key: 'components', label: '部件层' },
    { key: 'equipment', label: '设备层' },
  ];

  const grouped = {};
  sorted.forEach(g => {
    const layer = g.layer || layers[0].key;
    if (!grouped[layer]) grouped[layer] = [];
    grouped[layer].push(g);
  });

  let html = '';
  layers.forEach((layerDef, li) => {
    const items = grouped[layerDef.key];
    if (!items || items.length === 0) return;

    const iconColor = LAYER_COLORS[li % LAYER_COLORS.length];
    html += `<div class="layer-section">`;
    html += `<div class="layer-title"><span class="layer-icon" style="background:${iconColor}">${layerDef.label.charAt(0)}</span>${layerDef.label}</div>`;
    html += `<div class="grid">`;

    items.forEach(g => {
      const todayVal = g.today_return;
      const stocksHtml = g.stocks.map(s => {
        const scc = cc(s.change_pct);
        return `<tr>
          <td><span class="code">${s.code}</span> ${s.name} <span class="tier">${s.tier}</span></td>
          <td>${s.price.toFixed(2)}</td>
          <td class="${scc}" style="font-weight:600">${fmtPct(s.change_pct)}</td>
          <td style="color:var(--text-muted);font-size:12px">${s.market_cap.toFixed(0)}亿</td>
        </tr>`;
      }).join('');

      const stocksContent = g.stocks.length > 0
        ? `<table class="stock-table">
            <thead><tr><th>股票</th><th>现价</th><th>今日涨跌</th><th>流通市值</th></tr></thead>
            <tbody>${stocksHtml}</tbody>
           </table>`
        : `<div style="padding:20px;text-align:center;color:var(--text-muted);font-size:13px">暂无个股，编辑 config.json 添加</div>`;

      html += `<div class="group-card" id="card-${g.name}">
        <div class="card-header" onclick="toggleCard('${g.name}')">
          <div class="card-top">
            <div class="card-name">
              <span class="dot" style="background:${g.color}"></span>
              ${g.name}
            </div>
            <span class="expand-icon" id="icon-${g.name}">&#9662;</span>
          </div>
          <div class="card-metrics">
            <div class="metric">
              <div class="metric-label">今日</div>
              <div class="metric-value ${cc(todayVal)}">${fmtPct(todayVal)}</div>
            </div>
            <div class="metric">
              <div class="metric-label">5日</div>
              <div class="metric-value ${cc(g.cum_5d)}">${fmtPct(g.cum_5d)}</div>
            </div>
            <div class="metric">
              <div class="metric-label">20日</div>
              <div class="metric-value ${cc(g.cum_20d)}">${fmtPct(g.cum_20d)}</div>
            </div>
            <div class="metric">
              <div class="metric-label">市值</div>
              <div class="metric-value">${g.total_market_cap.toFixed(0)}<span class="unit">亿</span></div>
            </div>
          </div>
          <div class="card-desc">${g.desc}</div>
        </div>
        <div class="card-body" id="body-${g.name}">
          <div class="card-body-inner">
            ${stocksContent}
          </div>
        </div>
      </div>`;
    });

    html += `</div></div>`;
  });

  grid.innerHTML = html;
}

function toggleCard(name) {
  const body = document.getElementById('body-' + name);
  const icon = document.getElementById('icon-' + name);
  body.classList.toggle('open');
  icon.classList.toggle('open');
}

function scrollToCard(name) {
  const card = document.getElementById('card-' + name);
  if (card) {
    card.scrollIntoView({ behavior: 'smooth', block: 'center' });
    const body = document.getElementById('body-' + name);
    const icon = document.getElementById('icon-' + name);
    if (!body.classList.contains('open')) {
      body.classList.add('open');
      icon.classList.add('open');
    }
  }
}

function render() {
  if (!DATA) return;
  const chain = getChain();
  if (!chain) return;
  currentChain = chain.id;

  // 记住展开状态
  const expanded = new Set();
  document.querySelectorAll('.card-body.open').forEach(el => {
    expanded.add(el.id.replace('body-', ''));
  });

  document.getElementById('updateTime').textContent = '更新: ' + DATA.update_time;
  renderChainBar();
  renderRankBar(chain.groups);
  renderCards(chain);

  expanded.forEach(name => {
    const body = document.getElementById('body-' + name);
    const icon = document.getElementById('icon-' + name);
    if (body) body.classList.add('open');
    if (icon) icon.classList.add('open');
  });
}

function loadData() {
  // 先请求服务器更新数据，再读取
  fetch('/fetch?t=' + Date.now())
    .catch(() => {})  // 服务器不可用时忽略，直接读本地数据
    .then(() => fetch('data.json?t=' + Date.now()))
    .then(r => r.json())
    .then(data => {
      // 兼容旧版单链 data.json（{"groups": [...]}）
      if (!data.chains && data.groups) {
        data = { update_time: data.update_time, chains: [{ id: 'main', name: '产业链', layers: null, groups: data.groups }] };
      }
      DATA = data;
      render();
      resetCountdown();
    })
    .catch(() => {
      document.getElementById('grid').innerHTML =
        '<div style="padding:40px;text-align:center;color:#e74c3c">数据加载失败，先运行 python3 serve.py</div>';
    });
}

function resetCountdown() {
  countdownSec = REFRESH_INTERVAL;
  clearInterval(countdownTimer);
  countdownTimer = setInterval(() => {
    countdownSec--;
    document.getElementById('countdown').textContent = countdownSec + 's';
    if (countdownSec <= 0) {
      clearInterval(countdownTimer);
    }
  }, 1000);
}

function startAutoRefresh() {
  clearInterval(refreshTimer);
  refreshTimer = setInterval(loadData, REFRESH_INTERVAL * 1000);
}

function stopAutoRefresh() {
  clearInterval(refreshTimer);
  clearInterval(countdownTimer);
  document.getElementById('countdown').textContent = '';
}

// 周期 tab 切换
document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentPeriod = btn.dataset.period;
    render();
  });
});

// 自动刷新开关
document.getElementById('autoRefreshToggle').addEventListener('change', (e) => {
  if (e.target.checked) {
    startAutoRefresh();
    loadData();
  } else {
    stopAutoRefresh();
  }
});

// 初始化
loadData();
startAutoRefresh();
</script>
</body>
</html>
